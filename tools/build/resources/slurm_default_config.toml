[project]
name = "{name}"
operator = "{operator}"
date = "{date}"

[inputs]
commands = {commands}
parameters = "{parameters}"
freesurfer = false

[environment]
cluster = "slurm"
folder = "{hopla_dir}"
queue = "{partition}"
walltime = 48
n_cpus = {n_cpus}
memory = {memory}
image = "{image_file}"

[config]
dryrun = false
delay_s = 30
verbose = false
